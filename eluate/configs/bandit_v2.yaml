# Bandit v2 model configuration for Eluate
# Based on: https://github.com/ZFTurbo/Music-Source-Separation-Training

cls: Bandit

audio:
  chunk_size: 384000
  num_channels: 2
  sample_rate: 48000
  min_mean_abs: 0.000

kwargs:
  in_channels: 1
  stems: ['speech', 'music', 'sfx']
  band_type: musical
  n_bands: 64
  normalize_channel_independently: false
  treat_channel_as_feature: true
  n_sqm_modules: 8
  emb_dim: 128
  rnn_dim: 256
  bidirectional: true
  rnn_type: "GRU"
  mlp_dim: 512
  hidden_activation: "Tanh"
  hidden_activation_kwargs: null
  complex_mask: true
  use_freq_weights: true
  n_fft: 2048
  win_length: 2048
  hop_length: 512
  window_fn: "hann_window"
  wkwargs: null
  power: null
  center: true
  normalized: true
  pad_mode: "reflect"
  onesided: true
  fs: 48000

training:
  batch_size: 4
  gradient_accumulation_steps: 4
  grad_clip: 0
  instruments:
  - speech
  - music
  - sfx
  lr: 9.0e-05
  patience: 2
  reduce_factor: 0.95
  target_instrument: null
  num_epochs: 1000
  num_steps: 1000
  q: 0.95
  coarse_loss_clip: true
  ema_momentum: 0.999
  optimizer: adam
  other_fix: true
  use_amp: false  # Disabled for MPS compatibility

inference:
  batch_size: 8  # ZFTurbo's recommended value; 24 GB unified memory handles this fine
  dim_t: 256
  num_overlap: 2
