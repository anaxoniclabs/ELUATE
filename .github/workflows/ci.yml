name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4.0"

      - name: Run ruff
        run: ruff check eluate/ tests/

      - name: Check formatting
        run: ruff format --check eluate/ tests/

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      # mypy analyses source directly; ``ignore_missing_imports`` (see
      # pyproject) means the heavy runtime deps (torch, etc.) need not be
      # installed. The vendor subset is made opaque via follow_imports=skip
      # so only first-party type errors gate the merge.
      - name: Install mypy
        run: pip install "mypy>=1.0.0"

      - name: Run mypy
        run: mypy eluate/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: macos-latest
    needs: lint
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Smoke-check eluate --version
        # Fast sanity check: the console entry point imports cleanly and
        # reports a version. If this breaks, the wheel is unusable.
        run: eluate --version

      - name: Run tests with coverage
        # Floor reflects measured coverage: separator.py, download.py, and
        # most of cli.py need model weights / network / a real TTY to exercise.
        # Raise as coverage grows.
        run: |
          pytest tests/ \
            --cov=eluate \
            --cov-report=term-missing \
            --cov-fail-under=35 \
            -v

  audit:
    name: pip-audit (warn-only)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    # Starts as warn-only so advisories are visible without blocking merges.
    # Flip to required (drop continue-on-error) once the signal is clean.
    continue-on-error: true
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install "pip-audit>=2.7"

      - name: Audit dependencies
        run: pip-audit --strict .

  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install "bandit>=1.7"

      - name: Run bandit
        # Skips configured in pyproject.toml [tool.bandit]. Scope: eluate/
        # only; tests/ intentionally uses patterns bandit flags by design.
        run: bandit -c pyproject.toml -r eluate/
