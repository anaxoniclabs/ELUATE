name: Publish

# Two triggers, intentionally separated:
#   - workflow_dispatch  (manual button on the Actions tab) → TestPyPI
#   - release published  (write notes + click Publish on a GitHub
#                         Release)                          → PyPI
#
# Real PyPI is irreversible — once a version is uploaded, it can never
# be re-uploaded, only yanked. The release-publication ceremony exists
# to make a prod publish a deliberate act. TestPyPI is a rehearsal, so
# it gets the low-friction button.

on:
  workflow_dispatch:
  release:
    types: [published]

# Default to read-only across the whole workflow; individual jobs widen as needed.
permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          # The vendor/mss-training submodule is no longer needed at
          # build time — eluate ships a frozen subset under
          # eluate/_vendor/ that the wheel build picks up directly.
          # Skipping the submodule keeps CI fast and avoids touching
          # an external repo we don't need.
          submodules: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          # twine >= 6.0.1 is required to parse Metadata-Version 2.4
          # (PEP 639 license-expression), which setuptools 77+ emits.
          pip install build==1.2.2 twine==6.2.0

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify metadata
        run: twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI (rehearsal)
    needs: build
    # Only fires when you click "Run workflow" on the Actions tab.
    # Never on a tag push or a GitHub release publication.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/eluate
    permissions:
      id-token: write          # OIDC → TestPyPI trusted publishing
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          # PEP 740 attestations are auto-generated when uploading via
          # OIDC; ``attestations: true`` opts in explicitly.
          attestations: true

  publish-pypi:
    name: Publish to PyPI (trusted publisher)
    needs: build
    # Only fires when a GitHub Release is published — never on a manual
    # button-press or a bare tag push. The release-publication ceremony
    # is the gate that protects an irreversible PyPI upload.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/eluate
    permissions:
      id-token: write          # OIDC → PyPI trusted publishing
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      # Trusted publishing via OIDC (no long-lived token). The pending
      # publisher must be configured under the eluate PyPI project's
      # publishing settings before the first release:
      #   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
